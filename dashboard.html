    <script>
        let charts = {};

        window.onload = function() {
            loadDashboardData();
        };

        function loadDashboardData() {
            const btn = document.getElementById('refreshIcon');
            btn.classList.add('animate-spin');
            
            // เพิ่มการอัปเดตเวลาล่าสุด
            document.getElementById('lastUpdate').innerText = "กำลังซิงค์ข้อมูล...";

            google.script.run.withSuccessHandler(history => {
                btn.classList.remove('animate-spin');
                document.getElementById('lastUpdate').innerText = "อัปเดตเมื่อ: " + new Date().toLocaleTimeString('th-TH');
                if (history) processData(history);
            }).getDashboardData(); 
        }

        function processData(history) {
            let allTime = 0, thisMonth = 0, count = 0;
            const rev = {}, qty = {};
            const now = new Date(), curM = now.getMonth(), curY = now.getFullYear();

            history.forEach(inv => {
                try {
                    // ✅ บัคที่พบบ่อย: ข้อมูลในช่อง rawData ว่าง
                    if (!inv.rawData) return; 

                    const data = JSON.parse(inv.rawData);
                    const d = new Date(data.date);
                    const val = parseFloat(data.grandTotal) || 0;
                    
                    allTime += val;
                    
                    // เช็คยอดเดือนปัจจุบัน
                    if (d.getMonth() === curM && d.getFullYear() === curY) {
                        thisMonth += val; 
                        count++;
                        if (data.items) {
                            data.items.forEach(item => {
                                const code = item.code || "ไม่ระบุ";
                                qty[code] = (qty[code] || 0) + (parseFloat(item.qty) || 0);
                            });
                        }
                    }

                    // จัดกลุ่มรายเดือน
                    const monthKey = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');
                    rev[monthKey] = (rev[monthKey] || 0) + val;
                } catch (e) {
                    console.error("Error processing row:", e);
                }
            });

            // ✅ Animated Numbers
            animateNumber('allTimeTotal', allTime);
            animateNumber('thisMonthTotal', thisMonth);
            animateNumber('avgSales', count > 0 ? (thisMonth / count) : 0);

            renderCharts(rev, qty);
        }

        function animateNumber(id, finalValue) {
            const el = document.getElementById(id);
            let start = 0;
            const duration = 1000;
            const step = (finalValue / duration) * 10;
            
            const timer = setInterval(() => {
                start += step;
                el.innerText = "฿" + Math.floor(start).toLocaleString();
                if (start >= finalValue) {
                    clearInterval(timer);
                    el.innerText = "฿" + finalValue.toLocaleString(undefined, {minimumFractionDigits: 2});
                }
            }, 10);
        }

        function renderCharts(rev, qty) {
            // Setup Chart Defaults for 2026
            Chart.defaults.font.family = 'Sarabun';
            Chart.defaults.color = '#94a3b8';

            const months = Object.keys(rev).sort().slice(-6);
            const labels = months.map(m => {
                const p = m.split('-');
                return ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."][p[1]-1];
            });

            // 1. Line Chart Styling
            if (charts.sales) charts.sales.destroy();
            const ctx1 = document.getElementById('salesChart').getContext('2d');
            const gradient = ctx1.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(79, 70, 229, 0.4)');
            gradient.addColorStop(1, 'rgba(79, 70, 229, 0)');

            charts.sales = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'ยอดขายรายเดือน',
                        data: months.map(m => rev[m]),
                        borderColor: '#4f46e5',
                        borderWidth: 4,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#4f46e5',
                        pointHoverRadius: 8,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: gradient
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { display: false }, border: { display: false } },
                        x: { grid: { display: false }, border: { display: false } }
                    }
                }
            });

            // 2. Doughnut Chart Styling
            const top5Keys = Object.keys(qty).sort((a,b) => qty[b] - qty[a]).slice(0, 5);
            if (charts.qty) charts.qty.destroy();
            charts.qty = new Chart(document.getElementById('productQtyChart'), {
                type: 'doughnut',
                data: {
                    labels: top5Keys,
                    datasets: [{
                        data: top5Keys.map(c => qty[c]),
                        backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'],
                        borderWidth: 0,
                        hoverOffset: 20
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: {
                        legend: { position: 'bottom', labels: { padding: 20, usePointStyle: true } }
                    }
                }
            });
        }
    </script>
