<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบออกใบกำกับภาษี - PRO VERSION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; font-size: 13px; color: #333; }
        
        /* จัดการหน้าตาตอนดูบนเว็บปกติ */
        .a4-page {
            width: 210mm; 
            height: 297mm; 
            padding: 12mm 15mm; 
            margin: 10px auto;
            background: white; 
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative; 
            display: flex; 
            flex-direction: column;
            box-sizing: border-box;
        }

        /* แก้ปัญหาหน้ากระดาษแผ่นที่ 4 งอก (ตั้งค่าสำหรับตอนกด Print) */
        @media print {
            .no-print { display: none !important; }
            
            @page { 
                size: A4 portrait; 
                margin: 0mm; 
            }
            
            body { 
                background: white; 
                -webkit-print-color-adjust: exact; 
                print-color-adjust: exact; 
                margin: 0 !important;
                padding: 0 !important; /* ลบขอบล่างที่ทำให้กระดาษล้น */
            }
            
            .a4-page { 
                margin: 0 !important; 
                box-shadow: none !important; 
                page-break-after: always;
                height: 296mm !important; /* ปรับลดลง 1mm เพื่อกันเนื้อหาล้นไปหน้าใหม่ */
                overflow: hidden; /* บังคับไม่ให้มีอะไรเกิน A4 */
            }
            
            /* คำสั่งสำคัญ: แผ่นสุดท้าย (แผ่น 3) ไม่ต้องพยายามขึ้นหน้าใหม่แล้ว */
            #printArea .a4-page:last-child {
                page-break-after: auto !important;
            }
        }
        
        table { border-collapse: collapse; }
        .border-gray { border-color: #cbd5e1; }
        
        /* Theme สีประจำเอกสาร */
        .page-1 .theme-bg { background-color: #8B0000 !important; color: white !important; }
        .page-1 .theme-border { border-color: #8B0000 !important; }
        .page-2 .theme-bg { background-color: #E65C00 !important; color: white !important; }
        .page-2 .theme-border { border-color: #E65C00 !important; }
        .page-3 .theme-bg { background-color: #0047AB !important; color: white !important; }
        .page-3 .theme-border { border-color: #0047AB !important; }
        .page-1 table.product-table th, .page-1 table.product-table td { border: 1px solid #8B0000; }
        .page-2 table.product-table th, .page-2 table.product-table td { border: 1px solid #E65C00; }
        .page-3 table.product-table th, .page-3 table.product-table td { border: 1px solid #0047AB; }
    </style>
</head>
<body class="bg-gray-100 pb-20">

    <div class="no-print max-w-5xl mx-auto p-6 bg-white shadow-md mt-5 rounded-lg border-t-4 border-blue-600">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-blue-900">ระบบจัดการใบกำกับภาษี (PRO)</h1>
            <div class="space-x-2">
                <button onclick="clearForm()" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600 font-bold shadow">🔄 เริ่มใบใหม่</button>
                <button onclick="saveToDatabase()" id="btnSave" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700 font-bold shadow">💾 บันทึกข้อมูล</button>
                <button onclick="window.print()" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700 font-bold shadow">🖨️ พิมพ์ (PDF)</button>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-4 mb-4 bg-gray-50 p-4 rounded border">
            <div class="col-span-4 mb-2 grid grid-cols-2 gap-4 border-b pb-4">
                <div class="flex items-center gap-2">
                    <label class="font-bold w-32">โลโก้บริษัท (ซ้าย):</label>
                    <input type="file" id="logoUpload" accept="image/*" onchange="handleLogoUpload(event)" class="border p-1 rounded bg-white text-sm flex-grow">
                    <button onclick="clearLogo()" class="text-red-500 text-sm hover:underline">ลบ</button>
                </div>
                <div class="flex items-center gap-2">
                    <label class="font-bold w-32 text-right pr-2">โลโก้ ISO (ขวา):</label>
                    <input type="file" id="isoLogoUpload" accept="image/*" onchange="handleIsoLogoUpload(event)" class="border p-1 rounded bg-white text-sm flex-grow">
                    <button onclick="clearIsoLogo()" class="text-red-500 text-sm hover:underline">ลบ</button>
                </div>
            </div>

            <div class="col-span-4 grid grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">ดึงข้อมูลเก่าเพื่อแก้ไข</label>
                    <div class="flex gap-1">
                        <select id="historyDropdown" class="border p-2 rounded border-gray-300 w-full text-sm">
                            <option value="">กำลังโหลดประวัติ...</option>
                        </select>
                        <button onclick="loadInvoice()" class="bg-orange-500 text-white px-3 py-1 rounded hover:bg-orange-600 font-bold text-xs shadow-sm whitespace-nowrap">ดึงข้อมูล</button>
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">เลขที่ใบเสร็จ (เช่น 6903010)</label>
                    <div class="flex items-center border rounded border-gray-300 bg-white">
                        <span class="px-3 py-2 bg-gray-200 border-r border-gray-300 font-bold text-gray-700">IV</span>
                        <input type="text" id="invNo" placeholder="เลขที่เอกสาร" class="p-2 w-full outline-none" onkeyup="calculateAndRender()">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">วันที่ออกเอกสาร (ปฏิทิน)</label>
                    <input type="date" id="invDate" class="border p-2 rounded border-gray-300 w-full" onchange="calculateAndRender()">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">ส่วนลด %</label>
                    <input type="number" id="discountPercent" placeholder="ส่วนลด %" class="border p-2 rounded border-gray-300 w-full" value="0" onchange="calculateAndRender()" onkeyup="calculateAndRender()">
                </div>
            </div>
        </div>

        <div class="bg-blue-50 p-4 rounded-lg mb-4 border border-blue-100">
            <div class="flex justify-between items-end mb-2">
                <h2 class="font-bold text-lg text-blue-900">รายการสินค้า</h2>
                <button onclick="addBlankRow()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 font-bold text-sm shadow-sm">+ เพิ่มแถวใหม่</button>
            </div>
            
            <table class="w-full border-collapse bg-white shadow-sm">
                <thead><tr class="bg-blue-200 text-sm">
                    <th class="border-gray p-2 border">รหัสสินค้า (เลือก)</th>
                    <th class="border-gray p-2 border w-1/3">รายละเอียด</th>
                    <th class="border-gray p-2 border w-20">จำนวน</th>
                    <th class="border-gray p-2 border w-20">หน่วย</th>
                    <th class="border-gray p-2 border w-24">ราคา/หน่วย</th>
                    <th class="border-gray p-2 border w-24">รวมเงิน</th>
                    <th class="border-gray p-2 border w-10">ลบ</th>
                </tr></thead>
                <tbody id="inputRowsContainer">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="printArea"></div>

    <script>
        // ฐานข้อมูลรหัสสินค้า
        const productDatabase = {
            "71911-X7U00": { desc: "STAY,FR SEAT HEADREST EFC", price
