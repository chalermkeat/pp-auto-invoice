    <div class="max-w-7xl mx-auto p-6 mt-6">

                <h3 class="text-4xl font-black text-slate-800 mt-2" id="allTimeTotal">฿0.00</h3>

                </h3>
                <canvas id="salesChart" height="180"></canvas>
            </div>
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-700 mb-6 flex items-center gap-2 text-sm uppercase tracking-wider">
                    <span class="bg-emerald-100 p-2 rounded-lg text-emerald-600">📦</span> สัดส่วนสินค้าขายดี (เดือนนี้)

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] transform translate-y-20 opacity-0 transition-all duration-500 pointer-events-none">
        <div class="bg-slate-800 text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10">
            <div id="toast-icon">🚀</div>
            <p id="toast-msg" class="font-bold text-sm"></p>
        </div>
    </div>

    <script>
        let charts = {};

        window.onload = function() {
            loadDashboardData();
        };

        function loadDashboardData() {
            const btn = document.getElementById('refreshIcon');
            btn.classList.add('animate-spin');
            showToast("⏳ กำลังประมวลผลข้อมูลจากระบบ...");

            google.script.run.withSuccessHandler(history => {
                btn.classList.remove('animate-spin');
                if (history && history.length > 0) {
                    processDashboardData(history);
                    showToast("✅ อัปเดตข้อมูลสำเร็จ");
                } else {
                    showToast("⚠️ ไม่พบข้อมูลในระบบ", "error");
                }
            }).getDashboardData(); 
        }

        function processDashboardData(history) {
            let allTimeTotal = 0, thisMonthTotal = 0, thisMonthCount = 0;
            const monthlyRevenue = {}, monthlyProductQty = {};
            const now = new Date(), currentMonth = now.getMonth(), currentYear = now.getFullYear();

            history.forEach(inv => {
                try {
                    const data = JSON.parse(inv.rawData);
                    const d = new Date(data.date);
                    const totalVal = parseFloat(data.grandTotal) || 0;
                    allTimeTotal += totalVal;

                    if (d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                        thisMonthTotal += totalVal;
                        thisMonthCount++;

                        // เก็บสถิติสินค้าเฉพาะเดือนนี้
                        if (data.items) {
                            data.items.forEach(item => {
                                const code = item.code || "ไม่ระบุ";
                                monthlyProductQty[code] = (monthlyProductQty[code] || 0) + (parseFloat(item.qty) || 0);
                            });
                        }
                    }

                    // เก็บยอดขายรายเดือน (6 เดือนย้อนหลัง)
                    const monthKey = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');
                    monthlyRevenue[monthKey] = (monthlyRevenue[monthKey] || 0) + totalVal;
                } catch (e) { console.error("Data Parse Error", e); }
            });

            // อัปเดตตัวเลขบนการ์ด
            document.getElementById('allTimeTotal').innerText = "฿" + allTimeTotal.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('thisMonthTotal').innerText = "฿" + thisMonthTotal.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('billCountText').innerText = `พบ ${thisMonthCount} ใบกำกับภาษี`;
            
            const avg = thisMonthCount > 0 ? thisMonthTotal / thisMonthCount : 0;
            document.getElementById('avgSales').innerText = "฿" + avg.toLocaleString(undefined, {minimumFractionDigits: 2});

            renderSalesCharts(monthlyRevenue, monthlyProductQty);
        }

        function renderSalesCharts(revData, qtyData) {
            // เตรียม Label เดือนไทย
            const sortedMonths = Object.keys(revData).sort().slice(-6);
            const thaiMonths = sortedMonths.map(m => {
                const p = m.split('-');
                return ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."][p[1]-1] + " " + (parseInt(p[0])+543).toString().substr(2);
            });

            // 1. Line Chart: เทรนด์ยอดขาย
            if (charts.sales) charts.sales.destroy();
            charts.sales = new Chart(document.getElementById('salesChart'), {
                type: 'line',
                data: {
                    labels: thaiMonths,
                    datasets: [{
                        label: 'ยอดเงินรวม',
                        data: sortedMonths.map(m => revData[m]),
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 4
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            // 2. Doughnut Chart: สินค้าขายดี
            const top5Codes = Object.keys(qtyData).sort((a,b) => qtyData[b] - qtyData[a]).slice(0, 5);
            if (charts.qty) charts.qty.destroy();
            charts.qty = new Chart(document.getElementById('productQtyChart'), {
                type: 'doughnut',
                data: {
                    labels: top5Codes,
                    datasets: [{
                        data: top5Codes.map(c => qtyData[c]),
                        backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'],
                        hoverOffset: 15
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } 
                }
            });
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            msgEl.innerText = msg;
            document.getElementById('toast-icon').innerText = type === 'success' ? '✅' : '⚠️';
            t.classList.remove('translate-y-20', 'opacity-0');
            t.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { t.classList.remove('translate-y-0', 'opacity-100'); t.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        }
    </script>
</body>
</html>
