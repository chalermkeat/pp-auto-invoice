<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ใบกำกับภาษี - Paul's Dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; font-size: 13px; color: #333; }
        
        /* ปรับปรุงการจัดหน้ากระดาษให้แม่นยำขึ้น */
        .a4-page { 
            width: 210mm; 
            min-height: 296.5mm; 
            padding: 12mm 15mm; 
            margin: 0 auto; 
            background: white; 
            display: flex; 
            flex-direction: column; 
            box-sizing: border-box; 
            overflow: hidden;
            page-break-after: always;
            position: relative;
        }

        @media print { 
            .no-print { display: none !important; } 
            @page { size: A4 portrait; margin: 0; } 
            body { margin: 0; padding: 0; background: white; } 
            .a4-page { margin: 0; box-shadow: none; border: none; } 
        }

        table { border-collapse: collapse; width: 100%; }
        .theme-bg { color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        
        /* แก้ปัญหาสระลอยและขอบตาราง */
        .product-table th, .product-table td { 
            line-height: 1.4; 
            padding: 4px;
        }

        .page-1 .theme-bg { background-color: #8B0000 !important; } 
        .page-1 .theme-border { border: 1px solid #8B0000; }
        .page-2 .theme-bg { background-color: #E65C00 !important; } 
        .page-2 .theme-border { border: 1px solid #E65C00; }
        .page-3 .theme-bg { background-color: #0047AB !important; } 
        .page-3 .theme-border { border: 1px solid #0047AB; }
        
        .page-1 .product-table th, .page-1 .product-table td { border: 1px solid #8B0000; } 
        .page-2 .product-table th, .page-2 .product-table td { border: 1px solid #E65C00; } 
        .page-3 .product-table th, .page-3 .product-table td { border: 1px solid #0047AB; }
    </style>
</head>
<body class="bg-gray-100 pb-20">
    <div class="no-print bg-white shadow-md border-b-4 border-indigo-600 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex">
            <div class="px-6 py-4 font-bold text-xl text-indigo-900 border-r bg-indigo-50 flex items-center gap-2">⚙️ Paul's Dev</div>
            <a href="dashboard.html" class="px-4 py-4 font-bold flex-1 text-center bg-gray-200 text-gray-600 hover:bg-gray-300">📊 Dashboard</a>
            <a href="index.html" class="px-4 py-4 font-bold flex-1 text-center bg-indigo-600 text-white border-b-4 border-indigo-900">📝 1. ออกใบกำกับภาษี</a>
            <a href="billing.html" class="px-4 py-4 font-bold flex-1 text-center bg-gray-200 text-gray-600 hover:bg-gray-300">📅 2. ทำใบวางบิล</a>
        </div>
    </div>

    <div class="no-print max-w-5xl mx-auto p-6 bg-white shadow-md mt-5 rounded-lg border border-gray-200">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-blue-900">📝 ระบบออกใบกำกับภาษี</h2>
            <div class="space-x-2">
                <button onclick="clearInvoiceForm()" class="bg-gray-500 text-white px-4 py-2 rounded font-bold shadow text-sm">🔄 เริ่มใหม่</button>
                <button onclick="saveToDatabase()" id="btnSaveInvoice" class="bg-indigo-600 text-white px-4 py-2 rounded font-bold shadow text-sm">💾 บันทึก Cloud</button>
                <button onclick="downloadPDF(this)" class="bg-orange-500 text-white px-4 py-2 rounded font-bold shadow text-sm">📥 บันทึกเป็นไฟล์ PDF</button>
                <button onclick="window.print()" class="bg-green-600 text-white px-4 py-2 rounded font-bold shadow text-sm">🖨️ พิมพ์เอกสาร</button>
            </div>
        </div>
        
        <div class="grid grid-cols-4 gap-4 mb-4 bg-gray-50 p-4 rounded border">
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">เลือกลูกค้า</label>
                <select id="customerDropdown" class="border p-2 rounded w-full text-sm font-bold text-blue-800" onchange="calculateAndRenderInvoice()"></select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">เลขที่ใบเสร็จ</label>
                <div class="flex items-center border rounded bg-white">
                    <span class="px-2 py-2 bg-gray-200 border-r font-bold text-gray-700">IV</span>
                    <input type="text" id="invNo" class="p-2 w-full outline-none" onkeyup="calculateAndRenderInvoice()">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">วันที่</label>
                <input type="date" id="invDate" class="border p-2 rounded w-full" onchange="calculateAndRenderInvoice()">
            </div>
        </div>

        <div id="inputRowsContainer" class="space-y-2 mb-4"></div>
        <button onclick="addBlankRow()" class="bg-blue-600 text-white px-3 py-1 rounded font-bold text-xs">+ เพิ่มรายการ</button>
    </div>

    <div id="printArea"></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_uqrQDEI1PbLriTlg4I3vjyZ-BLgH7JJZqBf-I3xPQz3bPLLKL6ffqygmuA5Ky1Jl/exec';
        let productDatabase = {}; let customersDatabase = []; let itemsForPrint = [];
        let uploadedLogoUrl = ''; let uploadedIsoLogoUrl = '';

        window.onload = async function() {
            document.getElementById('invDate').valueAsDate = new Date();
            await fetchCloudData();
            addBlankRow();
        };

        async function fetchCloudData() {
            const resS = await fetch(SCRIPT_URL + "?type=settings"); const settings = await resS.json();
            uploadedLogoUrl = settings.company_logo || '';
            uploadedIsoLogoUrl = settings.iso_logo || '';
            
            const resC = await fetch(SCRIPT_URL + "?type=customers"); customersDatabase = await resC.json();
            const custDrop = document.getElementById('customerDropdown');
            custDrop.innerHTML = customersDatabase.map((c, i) => `<option value="${i}">${c.name}</option>`).join('');
            
            const resP = await fetch(SCRIPT_URL + "?type=products"); productDatabase = await resP.json();
            calculateAndRenderInvoice();
        }

        // ฟังก์ชันสร้าง PDF ที่แก้ไขเรื่องภาษาไทยและการจัดหน้า
        async function downloadPDF(btn) {
            const invNo = document.getElementById('invNo').value || 'New';
            const element = document.getElementById('printArea');
            
            const opt = {
                margin:       0,
                filename:     `Invoice_IV${invNo}.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { 
                    scale: 3, // เพิ่มความละเอียด
                    useCORS: true, 
                    letterRendering: true, // แก้ปัญหาสระลอยในภาษาไทย
                    scrollY: 0,
                    scrollX: 0
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            const originalText = btn.innerText;
            btn.innerText = "⏳ กำลังสร้างไฟล์...";
            btn.disabled = true;

            // รอให้ฟอนต์และรูปภาพโหลดเสร็จสมบูรณ์
            document.fonts.ready.then(() => {
                html2pdf().set(opt).from(element).save().then(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                });
            });
        }

        function addBlankRow() {
            const container = document.getElementById('inputRowsContainer');
            const div = document.createElement('div'); div.className = "flex gap-2 item-row";
            div.innerHTML = `
                <select class="pCode border p-1 rounded text-sm w-1/4" onchange="autoFill(this)">
                    <option value="">- รหัส -</option>
                    ${Object.keys(productDatabase).map(k => `<option value="${k}">${k}</option>`).join('')}
                </select>
                <input type="text" class="pDesc border p-1 rounded text-sm flex-grow" placeholder="รายละเอียด">
                <input type="number" class="pQty border p-1 rounded text-sm w-20 text-center" placeholder="จำนวน" onkeyup="calculateAndRenderInvoice()">
                <input type="number" class="pPrice border p-1 rounded text-sm w-24 text-right" placeholder="ราคา" onkeyup="calculateAndRenderInvoice()">
                <button onclick="this.parentElement.remove(); calculateAndRenderInvoice();" class="text-red-500">X</button>
            `;
            container.appendChild(div);
        }

        function autoFill(select) {
            const row = select.parentElement; const p = productDatabase[select.value];
            if(p) { row.querySelector('.pDesc').value = p.desc; row.querySelector('.pPrice').value = p.price; }
            calculateAndRenderInvoice();
        }

        function calculateAndRenderInvoice() {
            itemsForPrint = []; let subTotal = 0;
            document.querySelectorAll('.item-row').forEach(row => {
                const desc = row.querySelector('.pDesc').value;
                const qty = parseFloat(row.querySelector('.pQty').value) || 0;
                const price = parseFloat(row.querySelector('.pPrice').value) || 0;
                if(desc && qty > 0) { 
                    itemsForPrint.push({ desc, qty, price, total: qty * price }); 
                    subTotal += (qty * price); 
                }
            });
            renderA4(subTotal);
        }

        function renderA4(subTotal) {
            const vat = subTotal * 0.07; const grand = subTotal + vat;
            const custIdx = document.getElementById('customerDropdown').value;
            const cust = customersDatabase[custIdx] || { name: "-", address: "-", taxId: "-", branch: "" };
            const invNo = "IV" + (document.getElementById('invNo').value || '-');
            const date = document.getElementById('invDate').value ? new Date(document.getElementById('invDate').value).toLocaleDateString('th-TH') : '-';

            const printArea = document.getElementById('printArea'); printArea.innerHTML = '';
            const configs = [
                { t: 'ต้นฉบับใบกำกับภาษี', sub: 'ต้นฉบับสำหรับลูกค้า', s: 'page-1' },
                { t: 'สำเนาใบกำกับภาษี', sub: 'สำเนาสำหรับลูกค้า', s: 'page-2' },
                { t: 'สำเนาใบกำกับภาษี', sub: 'สำหรับบัญชี', s: 'page-3' }
            ];

            configs.forEach(conf => {
                printArea.innerHTML += `
                <div class="a4-page ${conf.s}">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex gap-4">
                            ${uploadedLogoUrl ? `<img src="${uploadedLogoUrl}" class="h-16 w-auto">` : ''}
                            <div>
                                <h2 class="font-bold text-lg text-gray-800">บริษัท พีพี ออโต้ ซัพพลาย จำกัด</h2>
                                <p class="text-[10px] leading-tight text-gray-600">471/1 หมู่ที่ 5 ต.ท่าบุญมี อ.เกาะจันทร์ จ.ชลบุรี 20240<br>เลขประจำตัวผู้เสียภาษี 0205566032069</p>
                            </div>
                        </div>
                        <div class="text-right">
                            ${uploadedIsoLogoUrl ? `<img src="${uploadedIsoLogoUrl}" class="h-10 ml-auto mb-1">` : ''}
                            <div class="theme-bg px-3 py-1 text-[11px] font-bold rounded-sm">${conf.sub}</div>
                        </div>
                    </div>
                    
                    <div class="theme-bg text-center py-2 font-bold text-lg mb-4 rounded-sm shadow-sm">${conf.t}</div>
                    
                    <div class="flex border theme-border p-3 text-[12px] mb-4 rounded-sm">
                        <div class="w-2/3 space-y-1">
                            <div><b>นามลูกค้า:</b> ${cust.name}</div>
                            <div><b>ที่อยู่:</b> ${cust.address}</div>
                            <div><b>เลขผู้เสียภาษี:</b> ${cust.taxId} / <b>${cust.branch || 'สำนักงานใหญ่'}</b></div>
                        </div>
                        <div class="w-1/3 text-right space-y-1">
                            <div><b>เลขที่:</b> ${invNo}</div>
                            <div><b>วันที่:</b> ${date}</div>
                        </div>
                    </div>

                    <table class="product-table text-[12px]">
                        <thead>
                            <tr class="theme-bg font-bold">
                                <th class="py-2">ลำดับ</th>
                                <th>รายการ</th>
                                <th>จำนวน</th>
                                <th>ราคา/หน่วย</th>
                                <th>จำนวนเงิน</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${itemsForPrint.map((it, i) => `
                                <tr>
                                    <td class="text-center">${i+1}</td>
                                    <td class="px-2">${it.desc}</td>
                                    <td class="text-center">${it.qty.toLocaleString()}</td>
                                    <td class="text-right px-2">${it.price.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                                    <td class="text-right px-2 bg-gray-50">${it.total.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                                </tr>
                            `).join('')}
                            ${Array(Math.max(0, 10 - itemsForPrint.length)).fill(0).map(() => `<tr><td class="h-6"></td><td></td><td></td><td></td><td class="bg-gray-50"></td></tr>`).join('')}
                        </tbody>
                    </table>

                    <div class="mt-4 flex border theme-border rounded-sm">
                        <div class="w-2/3 p-2 bg-gray-50 text-[11px] flex items-center">
                            <b>ตัวอักษร:</b> <span class="ml-2">(${ThaiBaht(grand)})</span>
                        </div>
                        <div class="w-1/3 text-[12px]">
                            <div class="flex justify-between p-1 border-b"><span>รวมเงิน</span><span>${subTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}</span></div>
                            <div class="flex justify-between p-1 border-b"><span>ภาษี 7%</span><span>${vat.toLocaleString(undefined, {minimumFractionDigits: 2})}</span></div>
                            <div class="flex justify-between p-1 theme-bg font-bold px-2 py-1"><span>ยอดรวมสุทธิ</span><span>${grand.toLocaleString(undefined, {minimumFractionDigits: 2})}</span></div>
                        </div>
                    </div>
                </div>`;
            });
        }

        function ThaiBaht(Number){if(Number==0)return"ศูนย์บาทถ้วน";var number=Number.toFixed(2).split(".");var baht=number[0];var satang=number[1];var output="";var thaiNumber=["ศูนย์","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"];var thaiUnit=["","สิบ","ร้อย","พัน","หมื่น","แสน","ล้าน"];for(var i=0;i<baht.length;i++){var n=baht.substr(i,1);if(n!=0){if(i==(baht.length-1)&&n==1&&baht.length>1)output+="เอ็ด";else if(i==(baht.length-2)&&n==2)output+="ยี่สิบ";else if(i==(baht.length-2)&&n==1)output+="สิบ";else output+=thaiNumber[n]+thaiUnit[baht.length-i-1]}}output+="บาท";if(satang=="00")output+="ถ้วน";else{for(var i=0;i<satang.length;i++){var n=satang.substr(i,1);if(n!=0){if(i==(satang.length-1)&&n==1)output+="เอ็ด";else if(i==(satang.length-2)&&n==2)output+="ยี่สิบ";else if(i==(satang.length-2)&&n==1)output+="สิบ";else output+=thaiNumber[n]+thaiUnit[satang.length-i-1]}}output+="สตางค์"}return output}
    </script>
</body>
</html>
