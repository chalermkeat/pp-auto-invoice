<script>
    window.onload = function() {
        google.script.run.withSuccessHandler(res => {
            document.getElementById('statTotal').innerText = '฿' + res.stats.total.toLocaleString(undefined, {minimumFractionDigits:2});
            document.getElementById('statVat').innerText = '฿' + res.stats.vat.toLocaleString(undefined, {minimumFractionDigits:2});
            
            let html = '';
            res.history.forEach(item => {
                const isSystem = item.source === 'System';
                const sourceBadge = isSystem ? 'bg-blue-100 text-blue-700' : 'bg-indigo-100 text-indigo-700';
                
                html += `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="p-4 text-slate-500 font-medium">${item.date}</td>
                        <td class="p-4 font-bold text-slate-800">${item.taxNo}</td>
                        <td class="p-4 text-slate-600">${item.customer}</td>
                        <td class="p-4 text-right font-black text-slate-800">฿${item.total.toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                        <td class="p-4 text-center">
                            <span class="${sourceBadge} text-[9px] font-bold px-3 py-1 rounded-full uppercase tracking-tighter">
                                ${isSystem ? '🤖 อัตโนมัติ' : '📝 คีย์เอง'}
                            </span>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('tableBody').innerHTML = html || '<tr><td colspan="5" class="p-10 text-center">ไม่พบข้อมูล</td></tr>';
        }).getSalesTaxReportData();
    };
</script>
