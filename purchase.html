<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกภาษีซื้อ - PP AUTO ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .bento-card { background: white; border-radius: 2rem; box-shadow: 0 4px 20px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        input:focus { border-color: #f97316 !important; ring: 2px #fdba74; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <?!= include('navbar', menuConfig); ?>

    <main class="max-w-6xl mx-auto p-6 lg:p-10">
        <input type="hidden" id="editModeNo" value="">

        <div class="flex justify-between items-end mb-8 gap-4">
            <div>
                <h2 id="pageTitle" class="text-3xl font-black text-slate-800 tracking-tight">📥 บันทึกภาษีซื้อ</h2>
                <p class="text-slate-500 font-medium italic mt-1">อัปโหลดรูปและใช้ AI ช่วยกรอกข้อมูลเพื่อความแม่นยำ</p>
            </div>
            <button onclick="resetForm()" class="bg-white border-2 border-slate-200 text-slate-600 px-5 py-2 rounded-xl font-bold shadow-sm hover:bg-slate-50 transition active:scale-95">🔄 ล้างฟอร์ม</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5">
                <div class="bento-card p-6 sticky top-28">
                    <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2">📸 แนบรูปใบกำกับภาษี</h3>
                    <div id="dropZone" class="border-2 border-dashed border-slate-200 rounded-[1.5rem] flex flex-col items-center justify-center p-6 text-center cursor-pointer hover:bg-slate-50 transition relative overflow-hidden min-h-[400px]" onclick="document.getElementById('fileInput').click()">
                        <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(this)">
                        <img id="imagePreview" class="absolute inset-0 w-full h-full object-contain hidden bg-slate-50 p-2">
                        <div id="uploadPrompt">
                            <p class="text-5xl mb-4">📂</p>
                            <p class="font-bold text-slate-400">คลิกเพื่ออัปโหลด หรือลากไฟล์มาวาง</p>
                        </div>
                    </div>
                    <button id="btnAiScan" onclick="triggerAIScan()" class="hidden w-full mt-4 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition active:scale-95">
                        ✨ ให้ AI ช่วยอ่านบิล (Gemini API)
                    </button>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="bento-card p-8 border-t-8 border-orange-500">
                    <div class="grid grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">วันที่ในบิล <span class="text-red-500">*</span></label>
                            <input type="date" id="taxDate" class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl outline-none font-bold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-wide">เลขที่ใบกำกับภาษี <span class="text-red-500">*</span></label>
                            <div class="relative">
                                <input type="text" id="taxNo" oninput="validateDuplicate(this.value)" placeholder="เลขที่บิล..." class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl outline-none focus:border-orange-500 transition font-bold text-blue-700 pr-10">
                                <div id="duplicateIcon" class="absolute right-3 top-1/2 -translate-y-1/2 hidden text-red-500">⚠️</div>
                            </div>
                            <p id="duplicateMsg" class="text-[10px] text-red-500 mt-1 font-bold hidden">‼️ เลขที่บิลนี้มีการบันทึกในระบบไปแล้ว</p>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase">เลขผู้เสียภาษี (13 หลัก) <span class="text-red-500">*</span></label>
                        <input type="text" id="taxID" maxlength="13" oninput="checkAutoFill('tax')" placeholder="xxxxxxxxxxxxx" class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl outline-none font-bold tracking-widest text-lg">
                    </div>

                    <div class="grid grid-cols-3 gap-6 mb-6">
                        <div class="col-span-2">
                            <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase">ชื่อบริษัทผู้ขาย <span class="text-red-500">*</span></label>
                            <input type="text" id="vendorName" list="vendorList" oninput="checkAutoFill('name')" placeholder="ค้นหาชื่อร้าน/บริษัท..." class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl outline-none font-bold">
                            <datalist id="vendorList"></datalist>
                        </div>
                        <div class="col-span-1">
                            <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase">สาขา</label>
                            <input type="text" id="branch" value="00000" maxlength="5" class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl outline-none font-bold text-center">
                        </div>
                    </div>

                    <div class="bg-indigo-600 p-8 rounded-[1.5rem] shadow-xl text-white mb-8">
                        <label class="block text-xs font-bold text-indigo-200 mb-2 uppercase">ยอดรวมสุทธิ (Grand Total) <span class="text-red-500">*</span></label>
                        <input type="number" id="grandTotal" step="0.01" onkeyup="calculateVat()" placeholder="0.00" class="w-full bg-transparent border-b-2 border-white/30 p-2 text-4xl font-black outline-none focus:border-white transition mb-4">
                        <div class="flex justify-between text-xs font-bold opacity-80">
                            <span>ฐานภาษี: <span id="baseAmount">0.00</span></span>
                            <span>VAT 7%: <span id="vatAmount">0.00</span></span>
                        </div>
                    </div>

                    <div class="mb-8">
                        <label class="block text-[10px] font-bold text-slate-400 mb-2 uppercase">สถานะการจ่ายเงิน</label>
                        <select id="paymentStatus" class="w-full bg-slate-50 border-2 border-slate-100 p-3 rounded-xl outline-none font-bold">
                            <option value="ชำระแล้ว">✅ ชำระแล้ว</option>
                            <option value="ยังไม่ชำระ">❌ ยังไม่ชำระ</option>
                        </select>
                    </div>

                    <button onclick="submitPurchase()" id="btnSave" class="w-full bg-orange-600 text-white p-5 rounded-2xl font-bold text-xl hover:bg-orange-700 shadow-xl shadow-orange-200 transition active:scale-95">
                        💾 บันทึกข้อมูลภาษีซื้อ
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] transform translate-y-20 opacity-0 transition-all duration-500 pointer-events-none">
        <div class="bg-slate-800 text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10">
            <div id="toast-icon">🚀</div>
            <p id="toast-msg" class="font-bold text-sm"></p>
        </div>
    </div>

    <script>
        let base64Image = null;
        let vendorDict = {}; 
        let vendorNameDict = {}; 

        window.onload = function() {
            resetForm(); // เริ่มต้นด้วยฟอร์มที่สะอาด
            loadVendorHistory();
            checkEditMode();
        };

        function checkEditMode() {
            google.script.url.getLocation(function(location) {
                const editNo = location.parameter.editNo;
                if (editNo) {
                    document.getElementById('editModeNo').value = editNo;
                    document.getElementById('pageTitle').innerText = '🛠️ แก้ไขข้อมูลภาษีซื้อ';
                    const btn = document.getElementById('btnSave');
                    btn.innerText = '💾 อัปเดตข้อมูลบิลเดิม';
                    btn.classList.replace('bg-orange-600', 'bg-blue-600');
                    
                    showToast("⏳ กำลังดึงข้อมูลบิลเดิม...");
                    google.script.run.withSuccessHandler(res => {
                        if (res.status === 'success') {
                            const d = res.data;
                            document.getElementById('taxDate').value = d.date;
                            document.getElementById('taxNo').value = d.taxNo;
                            document.getElementById('taxID').value = d.taxID.replace(/'/g, "");
                            document.getElementById('vendorName').value = d.vendor;
                            document.getElementById('branch').value = (d.branch || '00000').replace(/'/g, "");
                            document.getElementById('grandTotal').value = d.total;
                            document.getElementById('paymentStatus').value = d.paymentStatus;
                            calculateVat();
                        }
                    }).getPurchaseByTaxNo(editNo);
                }
            });
        }

        function calculateVat() {
            let total = parseFloat(document.getElementById('grandTotal').value) || 0;
            let base = total * 100 / 107;
            let vat = total - base;
            document.getElementById('baseAmount').innerText = base.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('vatAmount').innerText = vat.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        function checkAutoFill(type) {
            let taxField = document.getElementById('taxID');
            let nameField = document.getElementById('vendorName');
            if (type === 'tax') {
                let tax = taxField.value.trim();
                if (tax.length === 13) {
                    if (vendorDict[tax]) {
                        nameField.value = vendorDict[tax];
                        showToast("✅ พบข้อมูลจากประวัติเดิม");
                    } else {
                        google.script.run.withSuccessHandler(res => {
                            if (res.status === 'success') {
                                nameField.value = res.name;
                                showToast("✨ พบข้อมูลบริษัทใหม่!");
                            }
                        }).fetchCompanyFromCreden(tax);
                    }
                }
            } else if (type === 'name') {
                let name = nameField.value.trim();
                if (vendorNameDict[name]) {
                    taxField.value = vendorNameDict[name];
                    showToast("✅ เติมเลขนิติบุคคลให้อัตโนมัติ");
                }
            }
        }

        function loadVendorHistory() {
            google.script.run.withSuccessHandler(res => { 
                vendorDict = res.dict || {}; 
                const list = document.getElementById('vendorList');
                list.innerHTML = "";
                for (let tax in vendorDict) {
                    let name = vendorDict[tax];
                    vendorNameDict[name] = tax;
                    let option = document.createElement('option');
                    option.value = name;
                    list.appendChild(option);
                }
            }).getVendorHistory();
        }

        function handleFile(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                base64Image = e.target.result;
                document.getElementById('imagePreview').src = base64Image;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('uploadPrompt').classList.add('hidden');
                document.getElementById('btnAiScan').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function triggerAIScan() {
            const btn = document.getElementById('btnAiScan');
            btn.disabled = true; btn.innerText = "⏳ AI กำลังอ่านบิล...";
            google.script.run.withSuccessHandler(res => {
                btn.disabled = false; btn.innerText = "✨ ให้ AI ช่วยอ่านบิล (Gemini API)";
                if(res.status === 'success') {
                    const d = res.data;
                    if(d.taxNo) document.getElementById('taxNo').value = d.taxNo;
                    if(d.taxID) { document.getElementById('taxID').value = d.taxID; checkAutoFill('tax'); }
                    if(d.vendor) document.getElementById('vendorName').value = d.vendor;
                    if(d.total) { document.getElementById('grandTotal').value = d.total; calculateVat(); }
                    showToast("✅ AI สแกนข้อมูลสำเร็จ");
                }
            }).scanInvoiceWithAI(base64Image);
        }

        function submitPurchase() {
            const btn = document.getElementById('btnSave');
            const taxIDValue = document.getElementById('taxID').value.trim();
            const branchValue = document.getElementById('branch').value.trim() || '00000';

            const payload = {
                oldTaxNo: document.getElementById('editModeNo').value,
                date: document.getElementById('taxDate').value,
                taxNo: document.getElementById('taxNo').value.trim(),
                taxID: taxIDValue, 
                vendor: document.getElementById('vendorName').value.trim(),
                branch: branchValue, 
                total: parseFloat(document.getElementById('grandTotal').value) || 0,
                base: parseFloat(document.getElementById('baseAmount').innerText.replace(/,/g,'')),
                vat: parseFloat(document.getElementById('vatAmount').innerText.replace(/,/g,'')),
                paymentStatus: document.getElementById('paymentStatus').value,
                user: "Admin"
            };

            if(!payload.taxNo || !payload.vendor || payload.total <= 0) return showToast("⚠️ กรุณากรอกข้อมูลให้ครบ", "error");

            google.script.run.withSuccessHandler(isDup => {
                if (isDup && payload.oldTaxNo === "") {
                    showToast("❌ เลขที่บิลนี้มีในระบบแล้ว ไม่สามารถบันทึกซ้ำได้", "error");
                    return;
                }
                btn.disabled = true; btn.innerText = "⏳ กำลังบันทึก...";

                google.script.run.withSuccessHandler(res => {
                    if(res.status === 'success') {
                        showToast("✅ บันทึกสำเร็จ! พร้อมสำหรับบิลถัดไป", "success");
                        setTimeout(() => { 
                            resetForm();
                            btn.disabled = false;
                            btn.innerText = "💾 บันทึกข้อมูลภาษีซื้อ";
                        }, 1000);
                    } else {
                        btn.disabled = false; btn.innerText = "💾 บันทึกข้อมูลภาษีซื้อ";
                        showToast("❌ " + res.message, "error");
                    }
                }).savePurchase(payload, base64Image);
            }).checkDuplicateTaxNo(payload.taxNo);
        }

        function resetForm() {
            document.getElementById('editModeNo').value = "";
            document.getElementById('pageTitle').innerText = '📥 บันทึกภาษีซื้อ';
            document.getElementById('taxDate').valueAsDate = new Date();
            document.getElementById('taxNo').value = "";
            document.getElementById('taxID').value = "";
            document.getElementById('vendorName').value = "";
            document.getElementById('branch').value = "00000";
            document.getElementById('grandTotal').value = "";
            document.getElementById('baseAmount').innerText = "0.00";
            document.getElementById('vatAmount').innerText = "0.00";
            document.getElementById('paymentStatus').value = "ชำระแล้ว";
            base64Image = null;
            document.getElementById('imagePreview').src = "";
            document.getElementById('imagePreview').classList.add('hidden');
            document.getElementById('uploadPrompt').classList.remove('hidden');
            document.getElementById('btnAiScan').classList.add('hidden');
            document.getElementById('taxNo').classList.remove('border-red-500', 'bg-red-50');
            document.getElementById('duplicateIcon').classList.add('hidden');
            document.getElementById('duplicateMsg').classList.add('hidden');
            const btn = document.getElementById('btnSave');
            btn.innerText = '💾 บันทึกข้อมูลภาษีซื้อ';
            btn.className = "w-full bg-orange-600 text-white p-5 rounded-2xl font-bold text-xl hover:bg-orange-700 shadow-xl shadow-orange-200 transition active:scale-95";
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = type === 'success' ? '✅' : '⚠️';
            t.classList.remove('translate-y-20', 'opacity-0');
            t.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { t.classList.remove('translate-y-0', 'opacity-100'); t.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        }

        let typingTimer;
        function validateDuplicate(val) {
            const input = document.getElementById('taxNo');
            const icon = document.getElementById('duplicateIcon');
            const msg = document.getElementById('duplicateMsg');
            const editMode = document.getElementById('editModeNo').value;
            clearTimeout(typingTimer);
            if (!val || editMode !== "") {
                input.classList.remove('border-red-500', 'bg-red-50');
                icon.classList.add('hidden');
                msg.classList.add('hidden');
                return;
            }
            typingTimer = setTimeout(() => {
                google.script.run.withSuccessHandler(isDup => {
                    if (isDup) {
                        input.classList.add('border-red-500', 'bg-red-50');
                        icon.classList.remove('hidden');
                        msg.classList.remove('hidden');
                        showToast("⚠️ คำเตือน: พบเลขที่บิลซ้ำในระบบ", "error");
                    } else {
                        input.classList.remove('border-red-500', 'bg-red-50');
                        icon.classList.add('hidden');
                        msg.classList.add('hidden');
                    }
                }).checkDuplicateTaxNo(val);
            }, 500);
        }
    </script>
</body>
</html>
