<!DOCTYPE html>
<html lang="th">
<head>
    <?!= include('auth_script'); ?>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | PP AUTO ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .input-focus:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            border-color: #4f46e5;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="glass-card p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md transition-all duration-500 hover:shadow-indigo-500/10">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-600 rounded-3xl shadow-lg shadow-indigo-200 mb-6 transform -rotate-6">
                <span class="text-white text-3xl font-bold">PP</span>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">AUTO ERP</h1>
            <p class="text-slate-500 mt-2 font-medium">ระบบบริหารจัดการข้อมูลอัจฉริยะ</p>
        </div>
        
        <div class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">Employee ID</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </span>
                    <input type="text" id="username" placeholder="รหัสพนักงาน" autofocus 
                        class="w-full bg-slate-50 border-2 border-slate-100 p-4 pl-12 rounded-2xl text-lg font-semibold outline-none transition-all input-focus text-slate-700">
                </div>
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-400 mb-2 ml-1 uppercase tracking-widest">Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </span>
                    <input type="password" id="password" placeholder="รหัสผ่าน" 
                        class="w-full bg-slate-50 border-2 border-slate-100 p-4 pl-12 rounded-2xl text-lg font-semibold outline-none transition-all input-focus text-slate-700">
                </div>
            </div>
            
            <div class="pt-4">
                <button onclick="handleLogin()" id="loginBtn" 
                    class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold text-xl hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-xl shadow-indigo-100">
                    เข้าสู่ระบบ
                </button>
            </div>
        </div>

        <div class="mt-10 text-center">
            <div class="flex items-center justify-center gap-2 text-slate-400">
                <div class="h-[1px] w-8 bg-slate-200"></div>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Security System Active</span>
                <div class="h-[1px] w-8 bg-slate-200"></div>
            </div>
            <p class="text-[11px] text-slate-400 mt-4 font-medium italic">ระบบจะจดจำการล็อกอินของคุณเป็นเวลา 24 ชั่วโมง</p>
        </div>
    </div>

    <script>
        // ฟังก์ชันหน่วงหน้าจอเล็กน้อยเมื่อ Login สำเร็จเพื่อความสวยงาม
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!user || !pass) {
                showError("กรุณากรอกรหัสพนักงานและรหัสผ่าน");
                return;
            }

            // แสดงสถานะ Loading
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> กำลังตรวจสอบ...';

            google.script.run.withSuccessHandler(function(res) {
                if (res.status === 'success') {
                    const expiryTime = new Date().getTime() + (24 * 60 * 60 * 1000);
                    const sessionInfo = {
                        name: res.name,
                        expiry: expiryTime
                    };

                    localStorage.setItem('user_session', JSON.stringify(sessionInfo));
                    
                    // เปลี่ยนเป็นสถานะ Success ก่อนย้ายหน้า
                    btn.classList.remove('bg-indigo-600');
                    btn.classList.add('bg-green-500');
                    btn.innerHTML = '✅ สำเร็จ! กำลังเข้าสู่ระบบ...';

                    setTimeout(function() {
                        const url = "<?= ScriptApp.getService().getUrl(); ?>?page=dashboard";
                        window.top.location.href = url;
                    }, 800);
                } else {
                    showError(res.message);
                    btn.disabled = false;
                    btn.innerHTML = 'เข้าสู่ระบบ';
                }
            }).authenticateUser(user, pass);
        }

        function showError(msg) {
            // ใช้ Alert แบบเรียบง่ายแต่ดูดีกว่าปกติ
            alert("⚠️ " + msg);
        }

        // รองรับการกด Enter เพื่อ Login
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
