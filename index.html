<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ใบกำกับภาษี - Paul's Dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; font-size: 13px; color: #333; }
        .a4-page { width: 210mm; height: 297mm; padding: 12mm 15mm; margin: 10px auto; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; box-sizing: border-box; }
        @media print { .no-print { display: none !important; } @page { size: A4 portrait; margin: 0mm; } body { margin: 0 !important; padding: 0 !important; background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; } .a4-page { margin: 0 !important; box-shadow: none !important; page-break-after: always; height: 296mm !important; overflow: hidden; } #printArea .a4-page:last-child { page-break-after: auto !important; } }
        table { border-collapse: collapse; }
        .page-1 .theme-bg { background-color: #8B0000 !important; color: white !important; } .page-1 .theme-border { border-color: #8B0000 !important; }
        .page-2 .theme-bg { background-color: #E65C00 !important; color: white !important; } .page-2 .theme-border { border-color: #E65C00 !important; }
        .page-3 .theme-bg { background-color: #0047AB !important; color: white !important; } .page-3 .theme-border { border-color: #0047AB !important; }
        .product-table th, .product-table td { border: 1px solid #ccc; }
    </style>
</head>
<body class="bg-gray-100 pb-20">
    <div class="no-print bg-white shadow-md border-b-4 border-indigo-600 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex">
            <div class="px-6 py-4 font-bold text-xl text-indigo-900 border-r bg-indigo-50 flex items-center gap-2">⚙️ Paul's Dev</div>
            <a href="dashboard.html" class="px-6 py-4 font-bold flex-1 text-center bg-gray-200 text-gray-600 hover:bg-gray-300">📊 Dashboard</a>
            <a href="index.html" class="px-6 py-4 font-bold flex-1 text-center bg-indigo-600 text-white border-b-4 border-indigo-900">📝 1. ออกใบกำกับภาษี</a>
            <a href="billing.html" class="px-6 py-4 font-bold flex-1 text-center bg-gray-200 text-gray-600 hover:bg-gray-300">📅 2. ทำใบวางบิล</a>
        </div>
    </div>

    <div class="no-print max-w-5xl mx-auto p-6 bg-white shadow-md mt-5 rounded-lg border border-gray-200">
        <div class="mb-4 grid grid-cols-2 gap-4 border-b pb-4 bg-indigo-50 p-4 rounded border-indigo-100">
            <div class="flex flex-col gap-1">
                <label class="font-bold text-indigo-900 text-xs">อัปโหลดโลโก้บริษัท (ซ้าย):</label>
                <div class="flex gap-2"><input type="file" onchange="uploadLogoToCloud(event, 'company_logo')" class="border p-1 rounded bg-white text-xs flex-grow"><span id="logoStatus" class="text-xs text-green-600 font-bold self-center"></span></div>
            </div>
            <div class="flex flex-col gap-1">
                <label class="font-bold text-indigo-900 text-xs">อัปโหลดโลโก้ ISO (ขวา):</label>
                <div class="flex gap-2"><input type="file" onchange="uploadLogoToCloud(event, 'iso_logo')" class="border p-1 rounded bg-white text-xs flex-grow"><span id="isoStatus" class="text-xs text-green-600 font-bold self-center"></span></div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-blue-900">📝 ระบบออกใบกำกับภาษี</h2>
            <div class="space-x-1 flex">
                <button onclick="clearInvoiceForm()" class="bg-gray-500 text-white px-3 py-2 rounded font-bold shadow text-sm">🔄 เริ่มใหม่</button>
                <button onclick="saveToDatabase()" id="btnSaveInvoice" class="bg-indigo-600 text-white px-4 py-2 rounded font-bold shadow text-sm">💾 บันทึก Cloud</button>
                <button onclick="downloadInvoicePDF()" class="bg-orange-600 text-white px-4 py-2 rounded font-bold shadow text-sm">📥 บันทึก PDF</button>
                <button onclick="window.print()" class="bg-green-600 text-white px-4 py-2 rounded font-bold shadow text-sm">🖨️ พิมพ์</button>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-4 mb-4 bg-gray-50 p-4 rounded border">
            <div><label class="block text-xs font-bold text-gray-500 mb-1">เลือกลูกค้า</label><select id="customerDropdown" class="border p-2 rounded w-full text-sm font-bold text-blue-800" onchange="calculateAndRenderInvoice()"></select></div>
            <div><label class="block text-xs font-bold text-gray-500 mb-1">ประวัติ</label><div class="flex gap-1"><select id="historyDropdown" class="border p-2 rounded w-full text-sm"></select><button onclick="loadInvoice()" class="bg-orange-500 text-white px-2 py-1 rounded font-bold text-xs">ดึง</button></div></div>
            <div><label class="block text-xs font-bold text-gray-500 mb-1">เลขที่ใบเสร็จ</label><div class="flex items-center border rounded bg-white"><span class="px-2 py-2 bg-gray-200 border-r font-bold text-gray-700">IV</span><input type="text" id="invNo" class="p-2 w-full outline-none" onkeyup="calculateAndRenderInvoice()"></div></div>
            <div><label class="block text-xs font-bold text-gray-500 mb-1">วันที่ออกเอกสาร</label><input type="date" id="invDate" class="border p-2 rounded w-full" onchange="calculateAndRenderInvoice()"></div>
        </div>

        <div id="inputRowsContainer"></div>
        <button onclick="addBlankRow()" class="mt-2 bg-blue-600 text-white px-3 py-1 rounded font-bold text-xs">+ เพิ่มแถว</button>
    </div>

    <div id="printArea"></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_uqrQDEI1PbLriTlg4I3vjyZ-BLgH7JJZqBf-I3xPQz3bPLLKL6ffqygmuA5Ky1Jl/exec';
        let productDatabase = {}; let customersDatabase = []; let invoiceHistory = []; 
        let itemsForPrint = []; let uploadedLogoUrl = ''; let uploadedIsoLogoUrl = '';

        window.onload = async function() {
            document.getElementById('invDate').valueAsDate = new Date();
            await fetchCloudData();
            addBlankRow(); calculateAndRenderInvoice();
        };

        async function fetchCloudData() {
            try {
                const resS = await fetch(SCRIPT_URL + "?type=settings"); const settings = await resS.json();
                if(settings.company_logo) uploadedLogoUrl = settings.company_logo;
                if(settings.iso_logo) uploadedIsoLogoUrl = settings.iso_logo;

                const resP = await fetch(SCRIPT_URL + "?type=products"); productDatabase = await resP.json();
                const resC = await fetch(SCRIPT_URL + "?type=customers"); customersDatabase = await resC.json();
                const custDrop = document.getElementById('customerDropdown');
                custDrop.innerHTML = customersDatabase.map((c, i) => `<option value="${i}">${c.name}</option>`).join('');

                const resH = await fetch(SCRIPT_URL + "?type=invoice"); invoiceHistory = await resH.json();
                const histDrop = document.getElementById('historyDropdown');
                histDrop.innerHTML = '<option value="">-- เลือกบิล --</option>' + invoiceHistory.slice().reverse().map(inv => `<option value="${inv.invNo}">${inv.invNo}</option>`).join('');
                calculateAndRenderInvoice();
            } catch(e) {}
        }

        function uploadLogoToCloud(event, key) {
            const file = event.target.files[0]; if(!file) return;
            const statusEl = key === 'company_logo' ? document.getElementById('logoStatus') : document.getElementById('isoStatus');
            statusEl.innerText = "⏳ อัปโหลด...";
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = key === 'company_logo' ? 400 : 200;
                    const scaleSize = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, canvas.width, canvas.height); 
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const base64Str = canvas.toDataURL('image/jpeg', 0.8);
                    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({type: 'save_setting', key: key, value: base64Str}) })
                    .then(() => { statusEl.innerText = "✅ สำเร็จ"; if(key === 'company_logo') uploadedLogoUrl = base64Str; else uploadedIsoLogoUrl = base64Str; calculateAndRenderInvoice(); });
                }
                img.src = e.target.result;
            }
            reader.readAsDataURL(file);
        }

        function addBlankRow() {
            const container = document.getElementById('inputRowsContainer');
            const div = document.createElement('div'); div.className = "flex gap-2 mb-2 item-row";
            div.innerHTML = `
                <select class="pCode border p-1 rounded text-sm w-1/4" onchange="autoFill(this)">
                    <option value="">- รหัส -</option>
                    ${Object.keys(productDatabase).map(k => `<option value="${k}">${k}</option>`).join('')}
                </select>
                <input type="text" class="pDesc border p-1 rounded text-sm flex-grow" placeholder="รายละเอียด">
                <input type="number" class="pQty border p-1 rounded text-sm w-20 text-center" placeholder="จำนวน" onkeyup="calculateAndRenderInvoice()">
                <input type="number" class="pPrice border p-1 rounded text-sm w-24 text-right" placeholder="ราคา" onkeyup="calculateAndRenderInvoice()">
                <button onclick="this.parentElement.remove(); calculateAndRenderInvoice();" class="text-red-500 font-bold px-2">X</button>
            `;
            container.appendChild(div);
        }

        function autoFill(select) {
            const row = select.parentElement; const p = productDatabase[select.value];
            if(p) { row.querySelector('.pDesc').value = p.desc; row.querySelector('.pPrice').value = p.price; }
            calculateAndRenderInvoice();
        }

        function calculateAndRenderInvoice() {
            itemsForPrint = []; let subTotal = 0;
            document.querySelectorAll('.item-row').forEach(row => {
                const code = row.querySelector('.pCode').value;
                const desc = row.querySelector('.pDesc').value;
                const qty = parseFloat(row.querySelector('.pQty').value) || 0;
                const price = parseFloat(row.querySelector('.pPrice').value) || 0;
                if(desc || code) { itemsForPrint.push({ code, desc, qty, price, total: qty * price }); subTotal += (qty * price); }
            });
            renderA4(subTotal);
        }

        function renderA4(subTotal) {
            const vat = subTotal * 0.07; const grand = subTotal + vat;
            const custIdx = document.getElementById('customerDropdown').value;
            const cust = customersDatabase[custIdx] || { name: "-", address: "-", taxId: "-", branch: "สำนักงานใหญ่" };
            const invNo = "IV" + document.getElementById('invNo').value;
            const dateStr = document.getElementById('invDate').value;
            const date = dateStr ? new Date(dateStr).toLocaleDateString('th-TH') : '-';

            const printArea = document.getElementById('printArea'); printArea.innerHTML = '';
            const configs = [{ t: 'ต้นฉบับ', s: 'page-1' }, { t: 'สำเนา', s: 'page-2' }, { t: 'สำเนา', s: 'page-3' }];

            configs.forEach(conf => {
                printArea.innerHTML += `
                <div class="a4-page ${conf.s}">
                    <div class="flex justify-between items-start">
                        <div class="flex gap-4">
                            ${uploadedLogoUrl ? `<img src="${uploadedLogoUrl}" class="h-16">` : ''}
                            <div><h2 class="font-bold text-lg">บริษัท พีพี ออโต้ ซัพพลาย จำกัด</h2><p class="text-xs">เลขประจำตัวผู้เสียภาษี 0205566032069</p></div>
                        </div>
                        <div class="text-right">${uploadedIsoLogoUrl ? `<img src="${uploadedIsoLogoUrl}" class="h-12 mb-1">` : ''}<div class="theme-bg px-4 text-xs font-bold">${conf.t}</div></div>
                    </div>
                    <div class="theme-bg text-center py-1 my-2 font-bold">ใบกำกับภาษี / ใบส่งสินค้า</div>
                    <div class="flex border p-2 text-xs mb-2">
                        <div class="w-2/3">
                            <b>ลูกค้า:</b> ${cust.name}<br>
                            <b>ที่อยู่:</b> ${cust.address}<br>
                            <b>Tax ID:</b> ${cust.taxId} <b>/</b> <b class="text-blue-700">${cust.branch || 'สำนักงานใหญ่'}</b>
                        </div>
                        <div class="w-1/3 text-right"><b>เลขที่:</b> ${invNo}<br><b>วันที่:</b> ${date}</div>
                    </div>
                    <table class="w-full text-xs product-table">
                        <tr class="theme-bg"><th>ลำดับ</th><th>รายการ</th><th>จำนวน</th><th>ราคา</th><th>รวมเงิน</th></tr>
                        ${itemsForPrint.map((it, i) => `<tr><td class="text-center">${i+1}</td><td>${it.desc}</td><td class="text-center">${it.qty}</td><td class="text-right">${it.price.toFixed(2)}</td><td class="text-right">${it.total.toFixed(2)}</td></tr>`).join('')}
                    </table>
                    <div class="mt-auto text-right text-xs"><b>รวมเงิน:</b> ${subTotal.toFixed(2)}<br><b>VAT 7%:</b> ${vat.toFixed(2)}<br><b class="text-lg">รวมทั้งสิ้น: ${grand.toLocaleString()}</b></div>
                </div>`;
            });
        }

        // ฟังก์ชันดาวน์โหลด PDF
        function downloadInvoicePDF() {
            const invNo = document.getElementById('invNo').value || 'New';
            const element = document.getElementById('printArea');
            const opt = {
                margin: 0,
                filename: `Invoice_IV${invNo}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        async function saveToDatabase() {
            const rawInvNo = document.getElementById('invNo').value;
            if(!rawInvNo) return alert('⚠️ กรุณากรอกเลขที่ใบเสร็จ');
            const invNo = 'IV' + rawInvNo;
            const data = { type: 'invoice', invNo: invNo, date: document.getElementById('invDate').value, custName: customersDatabase[document.getElementById('customerDropdown').value]?.name || '-', items: itemsForPrint };
            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
                alert('✅ บันทึกเรียบร้อย');
            } catch(e) { alert('❌ ล้มเหลว'); }
        }

        function ThaiBaht(Number){if(Number==0)return"ศูนย์บาทถ้วน";var number=Number.toFixed(2).split(".");var baht=number[0];var satang=number[1];var output="";var thaiNumber=["ศูนย์","หนึ่ง","สอง","สาม","สี่","ห้า","หก","เจ็ด","แปด","เก้า"];var thaiUnit=["","สิบ","ร้อย","พัน","หมื่น","แสน","ล้าน"];for(var i=0;i<baht.length;i++){var n=baht.substr(i,1);if(n!=0){if(i==(baht.length-1)&&n==1&&baht.length>1)output+="เอ็ด";else if(i==(baht.length-2)&&n==2)output+="ยี่สิบ";else if(i==(baht.length-2)&&n==1)output+="สิบ";else output+=thaiNumber[n]+thaiUnit[baht.length-i-1]}}output+="บาท";if(satang=="00")output+="ถ้วน";else{for(var i=0;i<satang.length;i++){var n=satang.substr(i,1);if(n!=0){if(i==(satang.length-1)&&n==1)output+="เอ็ด";else if(i==(satang.length-2)&&n==2)output+="ยี่สิบ";else if(i==(satang.length-2)&&n==1)output+="สิบ";else output+=thaiNumber[n]+thaiUnit[satang.length-i-1]}}output+="สตางค์"}return output}
    </script>
</body>
</html>
