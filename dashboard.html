<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Paul's Dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Sarabun', sans-serif; }</style>
</head>
<body class="bg-gray-100 pb-20">

    <div class="no-print bg-white shadow-md border-b-4 border-indigo-600 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto flex">
            <div class="px-6 py-4 font-bold text-xl text-indigo-900 border-r bg-indigo-50 flex items-center gap-2">⚙️ Paul's Dev</div>
            <a href="dashboard.html" class="px-4 py-4 font-bold flex-1 text-center bg-indigo-600 text-white border-b-4 border-indigo-900">📊 Dashboard</a>
            <a href="index.html" class="px-4 py-4 font-bold flex-1 text-center bg-gray-200 text-gray-600 hover:bg-gray-300">📝 1. ออกใบกำกับภาษี</a>
            <a href="billing.html" class="px-4 py-4 font-bold flex-1 text-center bg-gray-200 text-gray-600 hover:bg-gray-300">📅 2. ทำใบวางบิล</a>
        </div>
    </div>

    <div class="max-w-5xl mx-auto p-6 mt-5">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">📊 สรุปยอดขาย (Dashboard)</h2>
        
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm">ยอดขายเดือนนี้ (บาท)</p>
                <h3 class="text-3xl font-bold text-gray-800" id="thisMonthTotal">กำลังโหลด...</h3>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-green-500">
                <p class="text-gray-500 text-sm">จำนวนใบกำกับภาษีเดือนนี้</p>
                <h3 class="text-3xl font-bold text-gray-800" id="thisMonthCount">0 ใบ</h3>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-l-4 border-purple-500">
                <p class="text-gray-500 text-sm">ยอดขายรวมทั้งหมด (บาท)</p>
                <h3 class="text-3xl font-bold text-gray-800" id="allTimeTotal">กำลังโหลด...</h3>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border">
            <h3 class="font-bold text-gray-700 mb-4">📈 กราฟยอดขายรายเดือน (ย้อนหลัง 6 เดือน)</h3>
            <canvas id="salesChart" height="100"></canvas>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby_uqrQDEI1PbLriTlg4I3vjyZ-BLgH7JJZqBf-I3xPQz3bPLLKL6ffqygmuA5Ky1Jl/exec'; // ใช้ URL ของคุณ
        
        window.onload = async function() {
            try {
                // ดึงข้อมูล Invoice ทั้งหมดมาคำนวณ
                const res = await fetch(SCRIPT_URL + "?type=invoice");
                const history = await res.json();
                
                let allTime = 0;
                let thisMonth = 0;
                let thisMonthDocs = 0;
                
                // จัดกลุ่มยอดขายรายเดือน สำหรับทำกราฟ
                const monthlyData = {};
                
                const currentMonth = new Date().getMonth();
                const currentYear = new Date().getFullYear();

                history.forEach(inv => {
                    if(inv.rawData) {
                        const data = JSON.parse(inv.rawData);
                        if(data.date && data.grandTotal) {
                            const d = new Date(data.date);
                            const val = parseFloat(data.grandTotal);
                            allTime += val;
                            
                            // เช็คว่าเป็นของเดือนนี้ไหม
                            if(d.getMonth() === currentMonth && d.getFullYear() === currentYear) {
                                thisMonth += val;
                                thisMonthDocs++;
                            }
                            
                            // จัดกลุ่มเดือน (เช่น "2026-03")
                            const monthKey = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0');
                            if(!monthlyData[monthKey]) monthlyData[monthKey] = 0;
                            monthlyData[monthKey] += val;
                        }
                    }
                });

                // อัปเดตตัวเลขบนหน้าจอ
                document.getElementById('allTimeTotal').innerText = "฿" + allTime.toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('thisMonthTotal').innerText = "฿" + thisMonth.toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('thisMonthCount').innerText = thisMonthDocs + " ใบ";

                // วาดกราฟ
                renderChart(monthlyData);
                
            } catch (err) {
                console.error("โหลดข้อมูล Dashboard ไม่สำเร็จ", err);
            }
        };

        function renderChart(monthlyData) {
            // เรียงลำดับเดือนจากอดีต -> ปัจจุบัน
            const sortedMonths = Object.keys(monthlyData).sort();
            
            // ดึงมาแค่ 6 เดือนล่าสุด
            const last6Months = sortedMonths.slice(-6);
            
            const labels = last6Months.map(m => {
                const parts = m.split('-');
                const monthNames = ["ม.ค.", "ก.พ.", "มี.ค.", "เม.ย.", "พ.ค.", "มิ.ย.", "ก.ค.", "ส.ค.", "ก.ย.", "ต.ค.", "พ.ย.", "ธ.ค."];
                return monthNames[parseInt(parts[1])-1] + " " + parts[0];
            });
            
            const dataValues = last6Months.map(m => monthlyData[m]);

            const ctx = document.getElementById('salesChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'ยอดขาย (บาท)',
                        data: dataValues,
                        backgroundColor: 'rgba(79, 70, 229, 0.6)',
                        borderColor: 'rgba(79, 70, 229, 1)',
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
    </script>
</body>
</html>
