                        <input type="text" id="taxID" maxlength="13" placeholder="xxxxxxxxxxxxx" oninput="checkAutoFill('tax')" class="w-full bg-slate-50 border-2 border-slate-200 p-3 rounded-xl outline-none focus:border-orange-500 transition font-mono text-lg tracking-widest text-slate-700">
                    </div>

                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wide">ชื่อบริษัทผู้ขาย <span class="text-red-500">*</span></label>
                            <input type="text" id="vendorName" list="vendorList" placeholder="ระบุชื่อบริษัท" oninput="checkAutoFill('name')" class="w-full bg-slate-50 border-2 border-slate-200 p-3 rounded-xl outline-none focus:border-orange-500 transition font-bold text-slate-700">
                            <datalist id="vendorList"></datalist>

                            <input type="text" id="branch" value="00000" maxlength="5" placeholder="00000" class="w-full bg-slate-50 border-2 border-slate-200 p-3 rounded-xl outline-none focus:border-orange-500 transition font-mono text-center text-lg tracking-widest font-bold text-slate-700">
                        </div>
                    </div>

                    <div class="bg-indigo-50/50 p-6 rounded-2xl border-2 border-indigo-100 mb-6">
                        <label class="block text-xs font-bold text-indigo-500 mb-2 uppercase tracking-wide">ยอดรวมทั้งสิ้น (Grand Total) <span class="text-red-500">*</span></label>
                        <input type="number" id="grandTotal" step="0.01" placeholder="0.00" onkeyup="autoCalculateVAT()" class="w-full bg-white border-2 border-indigo-200 p-4 rounded-xl outline-none focus:border-indigo-500 transition font-bold text-3xl text-indigo-700 mb-4 shadow-inner">
                        <div class="grid grid-cols-2 gap-4">

                                <p class="text-xs font-bold text-slate-400 uppercase">ฐานภาษี</p>
                                <p id="baseAmount" class="text-xl font-bold text-slate-700 mt-1">0.00</p>

                            <div class="bg-green-50 p-4 rounded-xl border border-green-100 shadow-sm">
                                <p class="text-xs font-bold text-green-500 uppercase">VAT 7%</p>
                                <p id="vatAmount" class="text-xl font-bold text-green-600 mt-1">0.00</p>
                            </div>
                        </div>

                    <div class="mb-8">
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wide">สถานะการชำระเงิน</label>
                        <select id="paymentStatus" class="w-full bg-slate-50 border-2 border-slate-200 p-3 rounded-xl outline-none focus:border-orange-500 transition font-bold text-slate-700">
                            <option value="ชำระแล้ว">✅ ชำระแล้ว</option>
                            <option value="ยังไม่ชำระ">❌ ยังไม่ชำระ</option>
                        </select>
                    </div>

                    <button onclick="submitPurchase()" id="btnSave" class="w-full bg-gradient-to-r from-orange-500 to-orange-600 text-white p-5 rounded-2xl font-bold text-xl hover:from-orange-600 hover:to-orange-700 transition shadow-lg shadow-orange-500/30 active:scale-[0.98]">
                        💾 บันทึกข้อมูลภาษีซื้อ
                    </button>
                </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] transform translate-y-20 opacity-0 transition-all duration-500 pointer-events-none">
        <div id="toast-card" class="bg-slate-800 text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10">
            <div id="toast-icon"></div>
            <p id="toast-msg" class="font-bold text-sm"></p>
        </div>
    </div>

    <script>
        let base64Image = null;
        let vendorDict = {};
        let typingTimer;

        window.onload = function() {
        document.getElementById('taxDate').valueAsDate = new Date();
        setupDragAndDrop();
        
        // 🚀 วิธีดึงค่า URL Parameters แบบมาตรฐาน Google Apps Script
        google.script.url.getLocation(function(location) {
            const editNo = location.parameter.editNo;
            
            if (editNo) {
                document.getElementById('editModeNo').value = editNo;
                document.getElementById('pageTitle').innerText = '🛠️ แก้ไขข้อมูลใบกำกับภาษี';
                document.getElementById('btnSave').innerHTML = '💾 อัปเดตข้อมูลบิลเดิม';
                document.getElementById('btnSave').classList.replace('from-orange-500', 'from-blue-600');
                
                showToast('⏳ กำลังดึงข้อมูลบิลเลขที่: ' + editNo, 'success');
                
                google.script.run.withSuccessHandler(res => {
                    if (res.status === 'success') {
                        const d = res.data;
                        document.getElementById('taxDate').value = d.date;
                        document.getElementById('taxNo').value = d.taxNo;
                        document.getElementById('taxID').value = d.taxID;
                        document.getElementById('vendorName').value = d.vendor;
                        document.getElementById('branch').value = d.branch;
                        document.getElementById('grandTotal').value = d.total;
                        document.getElementById('paymentStatus').value = d.paymentStatus;
                        autoCalculateVAT();
                        showToast('✅ ดึงข้อมูลสำเร็จ พร้อมแก้ไข', 'success');
                    } else {
                        showToast('❌ ไม่พบข้อมูลบิลนี้ในระบบ', 'error');
                    }
                }).getPurchaseByTaxNo(editNo);
            }
        });

        // โหลดประวัติ Vendor
        google.script.run.withSuccessHandler(res => {
            vendorDict = res.dict;
            const dataList = document.getElementById('vendorList');
            if(res.names) {
                res.names.forEach(name => {
                    let opt = document.createElement('option');
                    opt.value = name;
                    dataList.appendChild(opt);
                });
            }
        }).getVendorHistory();
    };

        function submitPurchase() {
            const btn = document.getElementById('btnSave');
            const editNo = document.getElementById('editModeNo').value;
            const session = JSON.parse(localStorage.getItem('user_session')) || { name: 'Admin' };
            
            const payload = {
                oldTaxNo: editNo, // ถ้าว่าง = บันทึกใหม่, ถ้ามีค่า = อัปเดตทับ
                date: document.getElementById('taxDate').value,
                taxNo: document.getElementById('taxNo').value.trim(),
                taxID: document.getElementById('taxID').value.trim(),
                vendor: document.getElementById('vendorName').value.trim(),
                branch: document.getElementById('branch').value.trim() || '00000',
                total: parseFloat(document.getElementById('grandTotal').value) || 0,
                base: parseFloat(document.getElementById('baseAmount').innerText.replace(/,/g, '')),
                vat: parseFloat(document.getElementById('vatAmount').innerText.replace(/,/g, '')),
                paymentStatus: document.getElementById('paymentStatus').value,
                user: session.name
            };

            if (!payload.taxNo || !payload.taxID || !payload.vendor || payload.total <= 0) {
                return showToast('⚠️ กรุณากรอกข้อมูลให้ครบถ้วน', 'error');
            }

            btn.disabled = true;
            btn.innerHTML = '⏳ กำลังบันทึกข้อมูล...';

            google.script.run.withSuccessHandler(res => {
                if(res.status === 'success') {
                    showToast('✅ บันทึกสำเร็จ!', 'success');
                    setTimeout(() => { 
                        window.top.location.href = "<?= ScriptApp.getService().getUrl(); ?>?page=dashboard_purchase";
                    }, 1000); 
                } else {
                    showToast('⚠️ ' + res.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = editNo ? '💾 อัปเดตข้อมูลบิลเดิม' : '💾 บันทึกข้อมูลภาษีซื้อ';
                }
            }).savePurchase(payload, base64Image); // ใช้ฟังก์ชันรวมที่เคยทำไว้
        }

        // --- ฟังก์ชันเสริม (UI/Calculation) ---

        function autoCalculateVAT() {
            let total = parseFloat(document.getElementById('grandTotal').value) || 0;
            let base = (total * 100) / 107;
            let vat = total - base;
            document.getElementById('baseAmount').innerText = base.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
            document.getElementById('vatAmount').innerText = vat.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function validateDuplicate(val) {
            clearTimeout(typingTimer);
            const editNo = document.getElementById('editModeNo').value;
            if (val === editNo) { resetTaxInput(); return; } // ถ้าเป็นเลขเดิมตอนแก้ไข ไม่ต้องเช็คซ้ำ

            typingTimer = setTimeout(() => {
                google.script.run.withSuccessHandler(isDup => {
                    const input = document.getElementById('taxNo');
                    if (isDup) {
                        input.classList.add('border-red-500', 'bg-red-50');
                        document.getElementById('duplicateIcon').classList.remove('hidden');
                        document.getElementById('duplicateMsg').classList.remove('hidden');
                        document.getElementById('btnSave').disabled = true;
                    } else { resetTaxInput(); }
                }).checkDuplicateTaxNo(val);
            }, 500);
        }

        function resetTaxInput() {
            const input = document.getElementById('taxNo');
            input.classList.remove('border-red-500', 'bg-red-50');
            document.getElementById('duplicateIcon').classList.add('hidden');
            document.getElementById('duplicateMsg').classList.add('hidden');
            document.getElementById('btnSave').disabled = false;
        }

        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                base64Image = e.target.result; 
                document.getElementById('imagePreview').src = base64Image;
                document.getElementById('imagePreview').classList.remove('hidden');
                document.getElementById('uploadPrompt').classList.add('hidden');
                document.getElementById('btnAiScan').classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        }

        function triggerAIScan() {
            if (!base64Image) return showToast('กรุณาแนบรูปภาพก่อน', 'error');
            const btn = document.getElementById('btnAiScan');
            btn.innerHTML = '⏳ AI กำลังอ่าน...';
            btn.disabled = true;
            google.script.run.withSuccessHandler(res => {
                btn.innerHTML = '✨ ให้ AI ช่วยอ่านบิล';
                btn.disabled = false;
                if (res.status === 'success') {
                    const d = res.data;
                    if(d.taxNo) { document.getElementById('taxNo').value = d.taxNo; validateDuplicate(d.taxNo); }
                    if(d.taxID) { document.getElementById('taxID').value = d.taxID; checkAutoFill('tax'); }
                    if(d.vendor) { document.getElementById('vendorName').value = d.vendor; checkAutoFill('name'); }
                    if(d.branch) document.getElementById('branch').value = d.branch;
                    if(d.total) { document.getElementById('grandTotal').value = d.total; autoCalculateVAT(); }
                    showToast('✅ สแกนสำเร็จ', 'success');
                }
            }).scanInvoiceWithAI(base64Image);
        }

        function setupDragAndDrop() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-active'); });
            dropZone.addEventListener('dragleave', (e) => { e.preventDefault(); dropZone.classList.remove('drag-active'); });
            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-active');
                if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; handleFile(fileInput); }
            });
        }

        function showToast(msg, type) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            document.getElementById('toast-icon').innerText = type === 'success' ? '🚀' : '⚠️';
            t.classList.remove('translate-y-20', 'opacity-0');
            t.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { t.classList.remove('translate-y-0', 'opacity-100'); t.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        }

        function checkAutoFill(type) {
            if (type === 'tax') {
                let tax = document.getElementById('taxID').value.trim();
                let nameField = document.getElementById('vendorName');
                if (tax.length === 13 && nameField.value === '') {
                    if (vendorDict[tax]) nameField.value = vendorDict[tax];
                    else google.script.run.withSuccessHandler(res => { if(res.status==='success') nameField.value=res.name; }).fetchCompanyFromCreden(tax);
                }
            }
        }
    </script>
</body>
